name: reqsai-web

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  web:
    profiles: [app]
    container_name: reqsai-web
    build:
      context: .
      dockerfile: Dockerfile
    image: reqsai-web:local
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4200}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
