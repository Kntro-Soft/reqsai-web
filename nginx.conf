server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers (inherited by location blocks that do not define their own add_header)
    add_header X-Frame-Options        SAMEORIGIN                         always;
    add_header X-Content-Type-Options nosniff                            always;
    add_header X-XSS-Protection       0                                  always;
    add_header Referrer-Policy        strict-origin-when-cross-origin    always;
    add_header Permissions-Policy     camera=(),microphone=(),geolocation=() always;

    # SPA fallback — all unknown routes served by index.html (Angular router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed static assets — long cache (Angular appends content hash to filenames)
    # nginx does not inherit parent add_header directives when a location defines
    # its own add_header, so security headers must be repeated in every location block.
    location ~* \.(js|css|woff|woff2|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control          public,immutable;
        add_header X-Frame-Options        SAMEORIGIN                         always;
        add_header X-Content-Type-Options nosniff                            always;
        add_header X-XSS-Protection       0                                  always;
        add_header Referrer-Policy        strict-origin-when-cross-origin    always;
        add_header Permissions-Policy     camera=(),microphone=(),geolocation=() always;
        access_log off;
    }

    # index.html — never cache (must always fetch the latest shell)
    location = /index.html {
        add_header Cache-Control          no-cache,no-store,must-revalidate;
        add_header Pragma                 no-cache;
        add_header X-Frame-Options        SAMEORIGIN                         always;
        add_header X-Content-Type-Options nosniff                            always;
        add_header X-XSS-Protection       0                                  always;
        add_header Referrer-Policy        strict-origin-when-cross-origin    always;
        add_header Permissions-Policy     camera=(),microphone=(),geolocation=() always;
        expires 0;
    }

    # Health check endpoint (used by load balancers / Docker healthcheck)
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 ok;
    }
}
