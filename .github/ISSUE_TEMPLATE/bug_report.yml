name: Bug report
description: Report a defect in the frontend
title: "fix: <short description>"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: context
    attributes:
      label: Feature module / area
      options:
        - iam
        - billing
        - workspace
        - discovery
        - core
        - shared / ui
        - layout
        - build / ci
        - unknown
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Navigate to ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - Browser: Chrome 126 / Firefox 127 / Safari 17
        - OS: macOS 15 / Windows 11
        - Commit / branch:
        - Angular: 22
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Console errors / network logs
      render: shell
    validations:
      required: false
